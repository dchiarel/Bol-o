name: 🚀 Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Re-deploy após o robô atualizar os resultados (o push do robô usa o
  # GITHUB_TOKEN e por isso não dispara o gatilho "push" acima).
  workflow_run:
    workflows: ["⚽ Atualizar Resultados Copa 2026"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload dos arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌐 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
